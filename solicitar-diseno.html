<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudio Creativo - UserVix</title>
    <link rel="stylesheet" href="solicitar-diseno.css">
</head>
<body class="chat-page-layout">

<header class="header">
    <div class="logo">
        <span class="logo-brand">UserVix</span>
        <span class="logo-sep">|</span>
        <span class="logo-sub">Estudio</span>
    </div>
<nav class="nav-links">
        <a href="dashboard.html" class="btn-outline">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 8px;">
                <path d="m15 18-6-6 6-6"/>
            </svg>
            Volver al Panel
        </a>
        <button onclick="toggleDarkMode()" id="darkBtn" class="btn-outline">🌙</button>
    </nav>
</header>

<main class="vix-chat-wrapper">
    <aside class="vix-chat-sidebar">
        <h4>Tu Interfaz</h4>
        <p>Cuéntanos tu necesidad y diseñaremos una estructura que se adapte a ti.</p>
    </aside>

    <div class="vix-chat-window">
        <div class="vix-chat-header">
            <div class="user-status">
                <div class="online-dot"></div>
                <span>Arquitecto UserVix</span>
            </div>
        </div>

        <div class="vix-chat-messages" id="chatBody">
            <div class="msg bot">
                ¡Hola! ¿Para quién diseñaremos hoy? Cuéntanos qué funciones o iconos necesitas destacar.
            </div>
        </div>

        <div class="vix-chat-footer">
            <input type="text" id="chatInput" placeholder="Escribe tu idea aquí...">
            <button id="chatSendBtn" class="send-btn">
                <svg viewBox="0 0 24 24" width="20" height="20">
                    <path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                </svg>
            </button>
        </div>
    </div>
</main>

<script src="solicitar-diseno.js"></script>
</body>
</html>
