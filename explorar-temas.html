<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Explorar Sistemas - UserVix</title>
    <link rel="stylesheet" href="explorar-temas.css">
</head>
<body>

<header class="header">
    <div class="logo">UserVix | Galería</div>
    <nav>
        <button onclick="toggleDarkMode()" id="darkBtn" class="btn-outline">🌙</button>
        <a href="dashboard.html">Volver al Panel</a>
    </nav>
</header>

<section class="gallery-header">
    <h1>SELECCIONAR Y DESCARGAR UN TEMA</h1>
    <p>Explora y gestiona tus launchers descargados</p>

    <div class="downloaded-themes">
        <div class="downloaded-card"><img src="so-1.png" alt="Tema 1"><p>Tema 1</p></div>
        <div class="downloaded-card"><img src="so-2.png" alt="Tema 2"><p>Tema 2</p></div>
        <div class="downloaded-card"><img src="so-3.png" alt="Tema 3"><p>Tema 3</p></div>
    </div>
</section>

<section class="gallery-grid">
    <div class="gallery-item"><img src="so-1.png" alt="SO Personalizado"></div>
    <div class="gallery-item"><img src="so-2.png" alt="SO Personalizado"></div>
    <div class="gallery-item"><img src="so-3.png" alt="SO Personalizado"></div>
    <div class="gallery-item"><img src="so-4.png" alt="SO Personalizado"></div>
    <div class="gallery-item"><img src="so-5.png" alt="SO Personalizado"></div>
    <div class="gallery-item"><img src="so-6.png" alt="SO Personalizado"></div>
</section>

<style>
    .gallery-header { text-align: center; padding: 60px 20px; }
    .gallery-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 20px;
        padding: 40px;
    }
    .gallery-item img {
        width: 100%;
        border-radius: 15px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        transition: 0.3s;
    }
    .gallery-item img:hover { transform: translateY(-10px); }
</style>

<footer>
    <p></p>
</footer>
<script src="explorar-temas.js"></script>
</body>
</html>
