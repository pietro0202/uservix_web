<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - UserVix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

<div class="auth-container">
    <div class="auth-box">
        <h2>Crear Cuenta</h2>
        <p>Únete a UserVix</p>

        <input type="text" id="nombre" placeholder="Nombre completo">
        <input type="text" id="nombre de usuario" placeholder="Nombre de Usuario">
        <input type="email" id="emailReg" placeholder="Correo electrónico">
        <input type="password" id="passReg" placeholder="Contraseña">
        <input type="password" id="passReg" placeholder="Confirmar Contraseña">

        <button class="btn-primary" onclick="registrar()">Registrarse</button>

        <p class="link-text">¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
